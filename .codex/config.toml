notify = ["/Users/anmonteiro/.nix-profile/bin/python3", "/Users/anmonteiro/.codex/notify.py"]
model_reasoning_summary = "auto"
file_opener = "none"
show_raw_agent_reasoning = true
sandbox_mode = "danger-full-access"
approval_policy = "never"
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"

trust_level = "trusted"
web_search = "live"

[mcp_servers.github]
command = "github-mcp-server"
args = ["stdio"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.github.env]
GITHUB_TOOLSETS = "context,actions,code_security,dependabot,discussions,gists,git,issues,labels,notifications,orgs,projects,pull_requests,repos,secret_protection,security_advisories,stargazers,users"

[mcp_servers.fff]
command = "fff-mcp"
args = ["--no-update-check"]


[sandbox_workspace_write]
network_access = true
writable_roots = [
  "/Users/anmonteiro/.cache",
  "/Users/anmonteiro/.cache/pip",
  "/Users/anmonteiro/.cache/uv",
  "/Users/anmonteiro/.cargo",
  "/Users/anmonteiro/.rustup",
  "/Users/anmonteiro/.yarn",
  "/Users/anmonteiro/.npm",
  "/Users/anmonteiro/.local/share/pnpm",
]

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[features]
prevent_idle_sleep = true

[tui]
no_alt_screen = true
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "session-id"]
